l_japanese:
  trait_painted_galaxy_reserved_spawn_desc: "This trait is used to customizing the empire spawn location in Paint a Galaxy maps, and will be automatically removed when the game starts. If the reserved solar system is not available (it was not designated in the map, or another empire with this trait spawned first), then this empire will instead spawn in a random location."
